<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת מיזוג נתונים פיננסיים - גרסה סופית</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Assistant', 'sans-serif'] },
                    colors: {
                        navy: { 700: '#1e3a8a', 800: '#1e293b', 900: '#0f172a' }
                    }
                }
            }
        }
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col font-sans">

    <header class="bg-navy-900 text-white shadow-lg">
        <div class="max-w-5xl mx-auto px-4 py-8">
            <h1 class="text-3xl font-bold flex items-center gap-3 text-emerald-400">
                <i class="fa-solid fa-chart-line"></i>
                <span class="text-white">מיזוג נתונים פיננסיים</span>
            </h1>
            <p class="text-slate-400 mt-2">משיכת מחירים היסטוריים, נרמול תאריכים וייצוא ל-CSV</p>
        </div>
    </header>

    <main class="flex-grow max-w-5xl mx-auto px-4 py-8 w-full">
        
        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-6 md:p-10 mb-10 transition-all">
            <form id="dataForm" class="space-y-8">
                
                <div>
                    <label for="tickers" class="block text-sm font-bold text-slate-700 mb-3">סימולי מניות (למשל: AAPL, TSLA, MSFT)</label>
                    <input type="text" id="tickers" name="tickers" placeholder="הפרד באמצעות פסיקים..." required
                        class="w-full px-5 py-4 rounded-xl border-2 border-slate-100 focus:ring-4 focus:ring-navy-700/10 focus:border-navy-700 transition-all outline-none text-left font-mono" dir="ltr">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div>
                        <label for="startDate" class="block text-sm font-bold text-slate-700 mb-3 text-right">תאריך התחלה</label>
                        <input type="date" id="startDate" name="startDate" required
                            class="w-full px-5 py-4 rounded-xl border-2 border-slate-100 focus:ring-4 focus:ring-navy-700/10 focus:border-navy-700 transition-all outline-none">
                    </div>
                    
                    <div>
                        <label for="endDate" class="block text-sm font-bold text-slate-700 mb-3 text-right">תאריך סיום</label>
                        <input type="date" id="endDate" name="endDate" required
                            class="w-full px-5 py-4 rounded-xl border-2 border-slate-100 focus:ring-4 focus:ring-navy-700/10 focus:border-navy-700 transition-all outline-none">
                    </div>

                    <div>
                        <label for="frequency" class="block text-sm font-bold text-slate-700 mb-3 text-right">תדירות דגימה</label>
                        <select id="frequency" name="frequency" required
                            class="w-full px-5 py-4 rounded-xl border-2 border-slate-100 focus:ring-4 focus:ring-navy-700/10 focus:border-navy-700 transition-all outline-none bg-white">
                            <option value="1d">יומי</option>
                            <option value="1wk">שבועי</option>
                            <option value="1mo">חודשי (מנורמל ל-1 בחודש)</option>
                        </select>
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" id="submitBtn" 
                        class="w-full md:w-auto px-10 py-4 bg-navy-800 hover:bg-navy-900 text-white font-bold rounded-xl shadow-lg hover:shadow-navy-900/20 transition-all flex items-center justify-center gap-3">
                        <span>הפעל מיזוג נתונים</span>
                        <i class="fa-solid fa-bolt"></i>
                    </button>
                </div>
            </form>
        </div>

        <div id="loadingState" class="hidden flex flex-col items-center justify-center py-20 animate-pulse">
            <div class="relative">
                <i class="fa-solid fa-circle-notch spinner text-6xl text-navy-700"></i>
                <i class="fa-solid fa-database absolute inset-0 flex items-center justify-center text-xl text-navy-700"></i>
            </div>
            <h3 class="text-2xl font-bold text-slate-800 mt-6">מעבד וממזג נתונים...</h3>
            <p class="text-slate-500 mt-2">אנחנו מושכים נתונים מ-Yahoo Finance ו-Google Finance</p>
        </div>

        <div id="resultsSection" class="hidden space-y-6">
            <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
                <div class="bg-emerald-50 px-8 py-5 border-b border-emerald-100 flex justify-between items-center">
                    <h2 class="text-lg font-bold text-emerald-900 flex items-center gap-2">
                        <i class="fa-solid fa-square-poll-vertical"></i> תצוגה מקדימה של המיזוג
                    </h2>
                    <span class="text-xs bg-emerald-200 text-emerald-800 px-3 py-1 rounded-full font-bold">5 שורות ראשונות</span>
                </div>
                
                <div class="p-8">
                    <div class="overflow-x-auto custom-scrollbar border border-slate-100 rounded-xl">
                        <table id="previewTable" class="w-full text-right table-auto">
                            <thead id="tableHead" class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider font-bold"></thead>
                            <tbody id="tableBody" class="text-sm text-slate-700 divide-y divide-slate-100"></tbody>
                        </table>
                    </div>

                    <div class="mt-10 flex flex-col sm:flex-row items-center gap-4">
                        <a id="downloadBtn" href="#" target="_blank"
                            class="w-full sm:w-auto px-10 py-5 bg-emerald-600 hover:bg-emerald-500 text-white font-black rounded-xl shadow-xl transition-all transform hover:-translate-y-1 flex items-center justify-center gap-4 text-lg">
                            <i class="fa-solid fa-file-csv"></i>
                            <span>הורד קובץ CSV מלא</span>
                        </a>
                        <p class="text-slate-400 text-sm">הקובץ נשמר אוטומטית ב-Google Drive שלך.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="errorModal" class="hidden fixed inset-0 bg-navy-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full p-8 border-t-8 border-red-500">
            <div class="flex items-center gap-4 text-red-600 mb-6">
                <i class="fa-solid fa-triangle-exclamation text-4xl"></i>
                <h3 class="text-2xl font-black">שגיאה בתהליך</h3>
            </div>
            <div id="errorMessage" class="text-slate-600 mb-8 bg-red-50 p-4 rounded-xl font-mono text-sm break-words"></div>
            <button onclick="closeErrorModal()" class="w-full py-4 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 transition-all">
                הבנתי, סגור
            </button>
        </div>
    </div>

    <script>
        const form = document.getElementById('dataForm');
        const submitBtn = document.getElementById('submitBtn');
        const loadingState = document.getElementById('loadingState');
        const resultsSection = document.getElementById('resultsSection');
        const tableHead = document.getElementById('tableHead');
        const tableBody = document.getElementById('tableBody');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorModal = document.getElementById('errorModal');
        const errorMessage = document.getElementById('errorMessage');

        // הקישור החדש שסיפקת
        const API_URL = 'https://script.google.com/macros/s/AKfycbwv7pYAPI8x0FJsuMsGyUW2Bwh-oBXXaiaYn5wD2pnjX7FiIsJSj5cNZNHQRsR4D4so/exec';

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            resultsSection.classList.add('hidden');
            loadingState.classList.remove('hidden');
            loadingState.classList.add('flex');
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50');

            const tickers = document.getElementById('tickers').value.split(',').map(t => t.trim().toUpperCase()).filter(t => t);
            const payload = {
                tickers: tickers,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload),
                    redirect: 'follow'
                });

                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                const data = await response.json();

                if (data.status === 'success') {
                    renderTable(data.previewData);
                    downloadBtn.href = data.downloadUrl;
                    loadingState.classList.add('hidden');
                    resultsSection.classList.remove('hidden');
                } else {
                    throw new Error(data.message || 'שגיאה לא ידועה בשרת');
                }
            } catch (err) {
                showError(err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50');
                loadingState.classList.add('hidden');
            }
        });

        function renderTable(data) {
            tableHead.innerHTML = ''; tableBody.innerHTML = '';
            if (!data || data.length === 0) return;

            const headerRow = document.createElement('tr');
            data[0].forEach(h => {
                const th = document.createElement('th');
                th.className = 'px-6 py-4 border-b border-slate-100';
                th.innerHTML = `<span dir="ltr">${h}</span>`;
                headerRow.appendChild(th);
            });
            tableHead.appendChild(headerRow);

            data.slice(1, 6).forEach(row => {
                const tr = document.createElement('tr');
                row.forEach((cell, i) => {
                    const td = document.createElement('td');
                    td.className = 'px-6 py-4';
                    td.innerHTML = `<span dir="ltr">${i > 0 && cell !== "" ? parseFloat(cell).toFixed(2) : cell}</span>`;
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });
        }

        function showError(msg) {
            errorMessage.innerText = msg;
            errorModal.classList.remove('hidden');
            loadingState.classList.add('hidden');
        }

        function closeErrorModal() { errorModal.classList.add('hidden'); }

        window.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            const yearAgo = new Date(); yearAgo.setFullYear(today.getFullYear() - 1);
            document.getElementById('endDate').valueAsDate = today;
            document.getElementById('startDate').valueAsDate = yearAgo;
        });
    </script>
</body>
</html>
