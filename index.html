<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedPepperChut - מיזוג נתוני שוק</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Assistant', 'sans-serif'] },
                    colors: {
                        navy: { 700: '#1e3a8a', 800: '#1e293b', 900: '#0f172a' },
                        pepper: { 500: '#ef4444', 600: '#dc2626' }
                    }
                }
            }
        }
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <header class="bg-white border-b border-slate-200 py-8 mb-8 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <h2 class="text-xl font-semibold text-slate-600 mb-1">ברוכים הבאים למיזוג נתונים של:</h2>
            <h1 class="text-4xl font-black text-pepper-600 mb-2 tracking-tight">RedPepperChut inc.</h1>
            <p class="text-lg text-slate-500 italic font-medium">the hottest pepper of the west</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 pb-12">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <div class="p-8 border-b border-slate-100">
                <form id="stockForm" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-slate-700 mb-2">סימולי מניות (מופרדים בפסיק)</label>
                            <input type="text" id="tickers" placeholder="לדוגמה: AAPL, TSLA, MSFT" required
                                class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-pepper-500 focus:border-pepper-500 outline-none transition-all text-left" dir="ltr">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">תאריך התחלה</label>
                            <input type="date" id="startDate" required
                                class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-pepper-500 focus:border-pepper-500 outline-none transition-all">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">תאריך סיום</label>
                            <input type="date" id="endDate" required
                                class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-pepper-500 focus:border-pepper-500 outline-none transition-all">
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-slate-700 mb-2">תדירות נתונים</label>
                            <select id="frequency" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-pepper-500 focus:border-pepper-500 outline-none transition-all">
                                <option value="1d">Daily (יומי)</option>
                                <option value="1wk">Weekly (שבועי)</option>
                                <option value="1mo">Monthly (חודשי)</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" 
                        class="w-full bg-pepper-600 hover:bg-pepper-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform hover:scale-[1.01] active:scale-95 flex justify-center items-center gap-3">
                        <i class="fa-solid fa-fire text-xl"></i>
                        <span>הפק קובץ נתונים ממוזג</span>
                    </button>
                </form>
            </div>

            <div id="loadingState" class="hidden p-12 text-center">
                <div class="inline-block mb-4">
                    <i class="fa-solid fa-pepper-hot text-5xl text-pepper-500 spinner"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-800">מבצע מיזוג נתונים...</h3>
                <p class="text-slate-500">אנא המתן, אנחנו מושכים נתונים מ-Yahoo וגוגל</p>
            </div>

            <div id="resultArea" class="hidden p-8 space-y-8 animate-fade-in">
                <div class="bg-emerald-50 border border-emerald-200 rounded-2xl p-6 text-center">
                    <h3 class="text-xl font-bold text-emerald-800 mb-4">הקובץ מוכן!</h3>
                    <a id="downloadBtn" href="#" target="_blank"
                        class="inline-flex items-center gap-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-8 rounded-xl shadow-md transition-all">
                        <i class="fa-solid fa-file-csv text-xl"></i>
                        הורד קובץ CSV
                    </a>
                </div>

                <div class="space-y-3">
                    <h4 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-table-list text-slate-400"></i>
                        תצוגה מקדימה (5 שורות ראשונות)
                    </h4>
                    <div class="overflow-x-auto custom-scrollbar border border-slate-200 rounded-xl">
                        <table class="w-full text-sm text-center border-collapse">
                            <thead id="tableHead" class="bg-slate-50 text-slate-700 font-bold"></thead>
                            <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="errorModal" class="hidden fixed inset-0 bg-navy-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-md w-full shadow-2xl overflow-hidden">
            <div class="bg-red-50 p-6 flex items-center gap-4 border-b border-red-100">
                <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center text-red-600">
                    <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold text-red-800">אופס, משהו השתבש</h3>
            </div>
            <div class="p-6">
                <p id="errorMessage" class="text-slate-600 leading-relaxed"></p>
            </div>
            <div class="p-6 pt-0">
                <button onclick="closeErrorModal()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl transition-all">
                    הבנתי, אנסה שוב
                </button>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwpx-u80GimJ5Qr4a30rbEB_swVtLhZ_xYqAf7h9EmCyr0vhaiH2sGKO0nHMKDlNzLCig/exec';

        const form = document.getElementById('stockForm');
        const loadingState = document.getElementById('loadingState');
        const resultArea = document.getElementById('resultArea');
        const downloadBtn = document.getElementById('downloadBtn');
        const tableHead = document.getElementById('tableHead');
        const tableBody = document.getElementById('tableBody');
        const errorModal = document.getElementById('errorModal');
        const errorMessage = document.getElementById('errorMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI States
            form.parentElement.classList.add('hidden');
            loadingState.classList.remove('hidden');
            resultArea.classList.add('hidden');

            const payload = {
                tickers: document.getElementById('tickers').value.split(',').map(t => t.trim().toUpperCase()).filter(t => t),
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.status === "success") {
                    renderPreview(result.previewData);
                    downloadBtn.href = result.downloadUrl;
                    loadingState.classList.add('hidden');
                    resultArea.classList.remove('hidden');
                } else {
                    throw new Error(result.message || "שגיאה לא ידועה בשרת");
                }
            } catch (err) {
                showError(err.message);
                form.parentElement.classList.remove('hidden');
            }
        });

        function renderPreview(data) {
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';
            
            if (!data || data.length === 0) return;

            const headerRow = document.createElement('tr');
            data[0].forEach(h => {
                const th = document.createElement('th');
                th.className = 'px-6 py-4 border-b border-slate-100';
                th.innerHTML = `<span dir="ltr">${h}</span>`;
                headerRow.appendChild(th);
            });
            tableHead.appendChild(headerRow);

            data.slice(1, 6).forEach(row => {
                const tr = document.createElement('tr');
                row.forEach((cell, i) => {
                    const td = document.createElement('td');
                    td.className = 'px-6 py-4';
                    td.innerHTML = `<span dir="ltr">${i > 0 && cell !== "" ? parseFloat(cell).toFixed(2) : cell}</span>`;
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });
        }

        function showError(msg) {
            errorMessage.innerText = msg;
            errorModal.classList.remove('hidden');
            loadingState.classList.add('hidden');
        }

        function closeErrorModal() { 
            errorModal.classList.add('hidden');
        }

        window.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            const yearAgo = new Date(); 
            yearAgo.setFullYear(today.getFullYear() - 1);
            document.getElementById('endDate').valueAsDate = today;
            document.getElementById('startDate').valueAsDate = yearAgo;
        });
    </script>
</body>
</html>
