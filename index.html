<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת איחוד נתוני שוק - גרסה מעודכנת</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700&display=swap');
        body { font-family: 'Heebo', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 shadow-2xl rounded-2xl p-8 w-full max-w-lg border border-slate-700">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">איחוד נתוני שוק</h1>
            <p class="text-slate-400 text-sm">הזן סימולים לייצור גיליון היסטורי (כולל גיבוי אוטומטי)</p>
        </div>

        <form id="stockForm" class="space-y-5">
            <div>
                <label for="tickers" class="block text-sm font-medium text-slate-300 mb-1">סימולי מניות (מופרדים בפסיק)</label>
                <input type="text" id="tickers" placeholder="לדוגמה: AAPL, MSFT, AMZN" required
                    class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" dir="ltr">
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label for="startDate" class="block text-sm font-medium text-slate-300 mb-1">תאריך התחלה</label>
                    <input type="date" id="startDate" required
                        class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors [&::-webkit-calendar-picker-indicator]:filter [&::-webkit-calendar-picker-indicator]:invert">
                </div>
                <div class="w-1/2">
                    <label for="endDate" class="block text-sm font-medium text-slate-300 mb-1">תאריך סיום</label>
                    <input type="date" id="endDate" required
                        class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors [&::-webkit-calendar-picker-indicator]:filter [&::-webkit-calendar-picker-indicator]:invert">
                </div>
            </div>

            <div>
                <label for="frequency" class="block text-sm font-medium text-slate-300 mb-1">תדירות נתונים</label>
                <select id="frequency" class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" dir="ltr">
                    <option value="1d">Daily (יומי)</option>
                    <option value="1wk">Weekly (שבועי)</option>
                    <option value="1mo">Monthly (חודשי)</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg px-4 py-3 mt-4 transition-colors flex justify-center items-center gap-2">
                <span id="btnText">הפק גיליון מאוחד</span>
                <svg id="loadingSpinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <div id="resultContainer" class="mt-6 hidden space-y-4">
            <a id="sheetLink" href="#" target="_blank" rel="noopener noreferrer" 
                class="block w-full text-center bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-lg px-4 py-4 transition-all shadow-lg transform hover:-translate-y-1">
                🔗 פתח גיליון נתונים (V2)
            </a>
            
            <div id="fallbackNotice" class="hidden p-3 bg-amber-900/40 border border-amber-600 rounded-lg text-amber-200 text-xs text-center">
                שים לב: חלק מהנתונים נמשכו באמצעות Google Finance עקב חסימה.
            </div>

            <div id="errorMessage" class="hidden p-4 bg-red-900/50 border border-red-500 rounded-lg text-red-200 text-sm text-center"></div>
        </div>

    </div>

    <script>
        // הכתובת החדשה שסופקה
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzziTjg9yvIefqgFRObrqe4Yi2prpjGkHIGEwCgoexZh8bKcKJ5kwd23pWFrcoPdIXEJg/exec';

        const form = document.getElementById('stockForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const resultContainer = document.getElementById('resultContainer');
        const sheetLink = document.getElementById('sheetLink');
        const fallbackNotice = document.getElementById('fallbackNotice');
        const errorMessage = document.getElementById('errorMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const tickersInput = document.getElementById('tickers').value;
            const tickersArray = tickersInput.split(',').map(t => t.trim().toUpperCase()).filter(t => t);
            
            const requestData = {
                tickers: tickersArray,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            // מצב טעינה
            submitBtn.disabled = true;
            btnText.textContent = 'מעבד בקשה ומבצע אימות...';
            loadingSpinner.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            fallbackNotice.classList.add('hidden');
            errorMessage.classList.add('hidden');

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(requestData)
                });

                const result = await response.json();

                if (result.status === "success" && result.sheetUrl) {
                    sheetLink.href = result.sheetUrl;
                    resultContainer.classList.remove('hidden');
                    
                    // בדיקה אם נעשה שימוש ב-Fallback והצגת הערה למשתמש
                    if (result.notes && result.notes.includes('Google Finance')) {
                        fallbackNotice.classList.remove('hidden');
                    }
                } else {
                    throw new Error(result.message || 'השרת החזיר תשובה לא תקינה');
                }

            } catch (error) {
                resultContainer.classList.remove('hidden');
                errorMessage.classList.remove('hidden');
                errorMessage.textContent = `שגיאה: ${error.message}`;
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'הפק גיליון מאוחד';
                loadingSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
